name: CI/CD — Test and Deploy ClinicalAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: clinicalai-backend
  S3_BUCKET: clinicalai-frontend-raju

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: test-key
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest tests/ -v

  test-frontend:
    name: Run Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        env:
          REACT_APP_API_URL: https://52.70.121.20.nip.io
          CI: false
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-to-ec2:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/clinicalai-key.pem
          chmod 400 ~/.ssh/clinicalai-key.pem
          ssh-keyscan -H 52.70.121.20 >> ~/.ssh/known_hosts || true

      - name: Deploy to EC2 via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/clinicalai-key.pem \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 131904957048.dkr.ecr.us-east-1.amazonaws.com
            docker pull 131904957048.dkr.ecr.us-east-1.amazonaws.com/clinicalai-backend:latest
            docker stop clinicalai-backend || true
            docker rm clinicalai-backend || true
            docker run -d \
              --name clinicalai-backend \
              --restart always \
              -p 8000:8000 \
              --add-host=host.docker.internal:host-gateway \
              --env-file /home/ec2-user/.env \
              131904957048.dkr.ecr.us-east-1.amazonaws.com/clinicalai-backend:latest
            docker ps
          ENDSSH

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ env.S3_BUCKET }} --delete --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E4SG9YM9I0K7L \
            --paths "/*"