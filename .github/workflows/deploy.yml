name: CI/CD — Test and Deploy ClinicalAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: clinicalai-backend
  EC2_HOST: ${{ secrets.EC2_HOST }}

jobs:
  # ── Job 1: Test Backend ──────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: test-key
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest tests/ -v

  # ── Job 2: Test Frontend ─────────────────────────
  test-frontend:
    name: Run Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: false
        run: |
          cd frontend
          npm install
          npm run build

  # ── Job 3: Build and Push to ECR ─────────────────
  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

  # ── Job 4: Deploy to EC2 ─────────────────────────
  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 131904957048.dkr.ecr.us-east-1.amazonaws.com

            # Pull latest image
            docker pull 131904957048.dkr.ecr.us-east-1.amazonaws.com/clinicalai-backend:latest

            # Stop and remove old container
            docker stop clinicalai-backend || true
            docker rm clinicalai-backend || true

            # Run new container
            docker run -d \
              --name clinicalai-backend \
              --restart always \
              -p 8000:8000 \
              -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              131904957048.dkr.ecr.us-east-1.amazonaws.com/clinicalai-backend:latest

            echo "Deployment complete!"
            docker ps